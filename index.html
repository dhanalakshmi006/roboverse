<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roboverse - Loading</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #7a6eab;
            --primary-dark: #1E1E1E;
            --primary-light: #9a8fc3;
            --text-light: #f8f8ff;
            --text-dark: #1a1a2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Satoshi', 'Panchang', 'Array', Helvetica, sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-light);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Background */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-dark) 0%, rgba(122, 110, 171, 0.2) 50%, var(--primary-dark) 100%);
            z-index: -1;
        }

        .circuit-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .circuit-line {
            position: absolute;
            background-color: rgba(122, 110, 171, 0.1);
        }

        .circuit-line:nth-child(1) {
            width: 2px;
            height: 300px;
            top: 10%;
            left: 20%;
            transform: rotate(30deg);
            animation: moveLine 8s infinite linear;
        }

        .circuit-line:nth-child(2) {
            width: 2px;
            height: 400px;
            top: 30%;
            right: 25%;
            transform: rotate(-20deg);
            animation: moveLine 10s infinite linear;
        }

        .circuit-line:nth-child(3) {
            width: 2px;
            height: 250px;
            bottom: 20%;
            left: 30%;
            transform: rotate(45deg);
            animation: moveLine 12s infinite linear;
        }

        .circuit-line:nth-child(4) {
            width: 2px;
            height: 350px;
            bottom: 15%;
            right: 35%;
            transform: rotate(-30deg);
            animation: moveLine 9s infinite linear;
        }

        @keyframes moveLine {
            0% {
                transform: translateY(0) rotate(var(--rotation));
            }
            100% {
                transform: translateY(-100vh) rotate(var(--rotation));
            }
        }

        .circuit-nodes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .circuit-node {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
            animation: pulse 2s infinite alternate;
        }

        .circuit-node:nth-child(1) {
            top: 15%;
            left: 15%;
            animation-delay: 0.2s;
        }

        .circuit-node:nth-child(2) {
            top: 25%;
            right: 20%;
            animation-delay: 0.5s;
        }

        .circuit-node:nth-child(3) {
            bottom: 20%;
            left: 25%;
            animation-delay: 0.8s;
        }

        .circuit-node:nth-child(4) {
            bottom: 30%;
            right: 15%;
            animation-delay: 1.1s;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.5);
                opacity: 1;
            }
        }

        /* Splash Container */
        .splash-container {
            text-align: center;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Container */
        .logo-container {
            width: 250px;
            height: 250px;
            margin: 0 auto 80px;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .logo-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(122, 110, 171, 0.1);
            border: 2px solid var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .logo-circle::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(122, 110, 171, 0.3), transparent);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .logo-icon {
            font-size: 4rem;
            color: var(--primary-color);
            z-index: 1;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--primary-color);
            }
            to {
                text-shadow: 0 0 15px var(--primary-color), 0 0 30px var(--primary-color);
            }
        }

        .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    z-index: 1;
}

        /* Text Content */
        .club-name {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-family: 'Array', sans-serif;
            animation: slideIn 1s ease-out 0.3s both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .university-name {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: var(--text-light);
            opacity: 0.8;
            font-family: 'Panchang', sans-serif;
            animation: slideIn 1s ease-out 0.5s both;
        }

        /* Loading Bar */
        .loading-container {
            width: 300px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 0 auto;
            overflow: hidden;
            animation: slideIn 1s ease-out 0.7s both;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-light));
            width: 0;
            animation: loading 3s ease-out 1s forwards;
        }

        @keyframes loading {
            0% {
                width: 0;
            }
            100% {
                width: 100%;
            }
        }

        /* Loading Text */
        .loading-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-light);
            opacity: 0.7;
            font-family: 'Satoshi', sans-serif;
            animation: slideIn 1s ease-out 0.9s both;
        }

        /* Skip Button */
        .skip-button {
            position: absolute;
            bottom: 30px;
            right: 30px;
            padding: 10px 20px;
            background-color: rgba(122, 110, 171, 0.2);
            color: var(--text-light);
            border: 1px solid var(--primary-color);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Satoshi', sans-serif;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            animation: slideIn 1s ease-out 1.1s both;
        }

        .skip-button:hover {
            background-color: var(--primary-color);
            transform: translateY(-3px);
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .club-name {
                font-size: 2.5rem;
            }

            .university-name {
                font-size: 1.1rem;
            }

            .logo-container {
                width: 200px;
                height: 200px;
            }

            .logo-icon {
                font-size: 3rem;
            }

        }

    </style>
</head>
<body>    
    <div class="bg-animation"></div>
    <div class="circuit-lines">
        <div class="circuit-line" style="--rotation: 30deg;"></div>
        <div class="circuit-line" style="--rotation: -20deg;"></div>
        <div class="circuit-line" style="--rotation: 45deg;"></div>
        <div class="circuit-line" style="--rotation: -30deg;"></div>
    </div>
    <div class="circuit-nodes">
        <div class="circuit-node"></div>
        <div class="circuit-node"></div>
        <div class="circuit-node"></div>
        <div class="circuit-node"></div>
    </div>

    <!-- Splash Content -->
    <div class="splash-container">
        <!-- Logo -->
        <div class="logo-container">
            <div class="logo-circle">
                <img src="img/logo1.png"/>
            </div>
        </div>
        
        <!-- Text Content -->
        <h1 class="club-name">Roboverse</h1>
        <p class="university-name">The Robotics Frontier of Mahindra University.</p>
        
        <!-- Loading Bar -->
        <div class="loading-container">
            <div class="loading-bar"></div>
        </div>
        <p class="loading-text">Initializing experience...</p>
    </div>


    <script>
        // Auto-redirect after loading completes
        window.addEventListener('load', function() {
            // Set timeout to match the loading bar animation (3s + 1s delay)
            setTimeout(function() {
                window.location.href = 'home.html';
            }, 4000);
        });
    </script>
</body>
</html>
